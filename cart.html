<!DOCTYPE html>
<html>
<head>

<title>Cart</title>

<style>

body{
font-family:Arial;
background:#fff4f8;
text-align:center;
}

.cart{
background:white;
margin:40px;
padding:20px;
border-radius:10px;
}

button{
background:#ff4fa3;
border:none;
color:white;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<h1>سلة المشتريات 🛒</h1>

<div class="cart">

<ul id="cart"></ul>

<p id="total"></p>

<a href="checkout.html">
<button>متابعة الطلب</button>
</a>

</div>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[]

let list=document.getElementById("cart")

let total=0

cart.forEach(item=>{

let li=document.createElement("li")

li.innerText=item.name+" - "+item.price+" جنيه"

list.appendChild(li)

total+=item.price

})

document.getElementById("total").innerText="المجموع: "+total+" جنيه"

</script>

</body>
</html>
